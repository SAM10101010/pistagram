name: pistagram
description: "Pistagram - Watch to Earn Instagram Clone"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  video_player: ^2.9.5
  shared_preferences: ^2.3.5
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  dio: ^5.7.0
  path: ^1.9.1
  share_plus: ^10.1.4
  google_sign_in: ^6.2.2
  mailer: ^6.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
