name: pistagram
description: "Pistagram - Watch to Earn Instagram Clone"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  video_player: ^2.9.5
  shared_preferences: ^2.3.5
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  dio: ^5.7.0
  path: ^1.9.1
  share_plus: ^10.1.4
  google_sign_in: ^6.2.2
  mailer: ^6.1.2
  intl: ^0.19.0
  file_picker: ^8.0.0
  cloud_functions: ^5.2.5
  flutter_secure_storage: ^9.2.4
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  just_audio: ^0.9.39
  on_audio_query: ^2.9.0
  permission_handler: ^11.3.1
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_app.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo_app.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
